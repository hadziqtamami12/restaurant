version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: restaurant-app
    container_name: restaurant-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - restaurant-network
    depends_on:
      - db
      - redis

  webserver:
    image: nginx:alpine
    container_name: restaurant-webserver
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - restaurant-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: restaurant-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-restaurant_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-root}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - restaurant-network

  redis:
    image: redis:alpine
    container_name: restaurant-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - restaurant-network

networks:
  restaurant-network:
    driver: bridge

volumes:
  dbdata:
